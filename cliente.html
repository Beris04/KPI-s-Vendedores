<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pedido digital Toyo Foods</title><style>
:root{--navy:#0b172a;--blue:#0f3f7a;--line:#dbe5f2;--ink:#0f172a;--muted:#64748b;--bg:#eef3f9}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ink);font-size:13px}.doc{max-width:1060px;margin:18px auto;background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 12px 30px rgba(15,23,42,.10)}.hero{padding:22px 28px;display:flex;align-items:center;gap:16px;border-bottom:6px solid var(--blue);background:#fff}.hero img{width:64px;height:64px;border-radius:15px}.hero small{display:block;color:var(--blue);font-weight:900;letter-spacing:.10em}.hero h1{font-size:32px;margin:2px 0 4px;color:var(--blue);line-height:1}.hero .date{color:var(--muted);font-weight:700}.content{padding:26px 28px}.info{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}.box{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px 16px;min-height:78px}.box small{display:block;color:#334155;text-transform:uppercase;font-weight:900;letter-spacing:.08em;margin-bottom:7px;font-size:11px}.box b{font-size:18px}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th{background:#f1f5f9;color:#334155;text-transform:uppercase;letter-spacing:.08em;text-align:left;font-size:11px;padding:12px;border-bottom:1px solid var(--line)}.table td{padding:12px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}.table th:nth-child(1),.table td:nth-child(1){width:22%;font-weight:800}.table th:nth-child(3),.table td:nth-child(3){width:12%;text-align:center;font-weight:900}.comments{margin-top:18px;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px 16px}.comments small{display:block;text-transform:uppercase;font-weight:900;letter-spacing:.08em;margin-bottom:8px;color:#334155}.totals{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.total{background:#0b172a;color:#fff;border-radius:16px;padding:16px}.total small{display:block;text-transform:uppercase;color:#cbd5e1;font-weight:900;letter-spacing:.08em}.total b{display:block;font-size:30px;margin-top:6px}.footer{margin-top:22px;color:#64748b;font-size:12px;border-top:1px solid var(--line);padding-top:14px}.actions{display:flex;gap:10px;margin-top:20px}.btn{border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer}.btn.primary{background:#0f3f7a;color:#fff;border-color:#0f3f7a}@media print{body{background:#fff}.doc{margin:0;max-width:none;border:0;border-radius:0;box-shadow:none}.hero{padding:18px 22px;border-bottom:4px solid #0f3f7a}.content{padding:22px}.actions{display:none}.box,.comments,.total{-webkit-print-color-adjust:exact;print-color-adjust:exact}.table th{background:#f1f5f9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}@page{margin:12mm}}
@media(max-width:720px){.info,.totals{grid-template-columns:1fr}.hero h1{font-size:26px}.content{padding:18px}.doc{margin:0;border-radius:0}}
</style></head><body><div class="doc"><div class="hero"><img src="assets/toyo_logo.png"><div><small>TOYO FOODS</small><h1>Pedido digital</h1><div class="date">Documento generado: <span id="date"></span></div></div></div><div class="content"><div class="info"><div class="box"><small>Cliente</small><b id="client"></b></div><div class="box"><small>Código cliente</small><b id="code"></b></div><div class="box"><small>Vendedor</small><b id="vendor"></b></div><div class="box"><small>Atendió</small><b id="user"></b></div></div><table class="table"><thead><tr><th>Código</th><th>Descripción</th><th>Piezas</th></tr></thead><tbody id="tbody"></tbody></table><div class="comments" id="commentsBox" style="display:none"><small>Comentarios</small><div id="comments"></div></div><div class="totals"><div class="total"><small>Total productos</small><b id="totalProd"></b></div><div class="total"><small>Total piezas</small><b id="totalPzas"></b></div></div><div class="footer">Este documento fue generado desde el formato digital de pedidos de Toyo Foods.</div><div class="actions"><button class="btn primary" onclick="window.print()">Imprimir / PDF</button><button class="btn" onclick="window.close()">Cerrar</button></div></div></div><script>
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function init(){let saved=JSON.parse(localStorage.getItem('last_order')||'{}');let c=saved.client||{};let order=saved.order||[];document.getElementById('client').textContent=c.name||'Sin cliente';document.getElementById('code').textContent=c.code||'';document.getElementById('vendor').textContent=c.vendor||'';document.getElementById('user').textContent=saved.user||'';document.getElementById('date').textContent=saved.created||new Date().toLocaleString('es-MX');document.getElementById('tbody').innerHTML=order.map(p=>`<tr><td>${esc(p.code)}</td><td>${esc(p.name)}</td><td>${p.qty}</td></tr>`).join('')||'<tr><td colspan="3">Sin productos capturados</td></tr>';let comments=(saved.comments||'').trim(); if(comments){document.getElementById('commentsBox').style.display='block';document.getElementById('comments').textContent=comments;}document.getElementById('totalProd').textContent=order.length;document.getElementById('totalPzas').textContent=order.reduce((a,b)=>a+Number(b.qty||0),0)}
window.onload=init;
</script></body></html>
